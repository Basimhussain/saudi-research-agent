services:
  postgres:
    image: postgres:16-alpine
    container_name: saudi-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saudi_agent}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-saudi_agent}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saudi-agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-agent}@postgres:5432/${POSTGRES_DB:-saudi_agent}
      DB_POOL_MIN: "2"
      DB_POOL_MAX: "10"
      DB_SSLMODE: "disable"
      DB_APPLICATION_NAME: "saudi-research-agent"
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  pgdata:
    name: saudi-agent-pgdata
